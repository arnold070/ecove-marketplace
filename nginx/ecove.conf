# ═══════════════════════════════════════════════════════════
# Nginx config for Ecove Marketplace
# Place this file at: /etc/nginx/sites-available/ecove
# Then: ln -s /etc/nginx/sites-available/ecove /etc/nginx/sites-enabled/ecove
# ═══════════════════════════════════════════════════════════

# Redirect HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name ecove.com.ng www.ecove.com.ng;
    return 301 https://$host$request_uri;
}

# Main HTTPS server
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name ecove.com.ng www.ecove.com.ng;

    # SSL — Certbot will fill these in automatically
    ssl_certificate     /etc/letsencrypt/live/ecove.com.ng/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ecove.com.ng/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header X-Frame-Options         "SAMEORIGIN"                   always;
    add_header X-Content-Type-Options  "nosniff"                      always;
    add_header X-XSS-Protection        "1; mode=block"                always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header Permissions-Policy      "camera=(), microphone=(), geolocation=()" always;

    # Logs
    access_log /var/log/nginx/ecove.access.log;
    error_log  /var/log/nginx/ecove.error.log;

    # Upload size (for product images)
    client_max_body_size 20M;

    # Cache Next.js static assets for 1 year
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3000;
        add_header Cache-Control "public, max-age=31536000, immutable";
        proxy_cache_valid 200 1y;
    }

    # Cache public folder assets
    location /images/ {
        proxy_pass http://127.0.0.1:3000;
        add_header Cache-Control "public, max-age=86400";
    }

    # Proxy everything else to Next.js
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade            $http_upgrade;
        proxy_set_header   Connection         "upgrade";
        proxy_set_header   Host               $host;
        proxy_set_header   X-Real-IP          $remote_addr;
        proxy_set_header   X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto  $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
        proxy_send_timeout    120s;
    }
}
